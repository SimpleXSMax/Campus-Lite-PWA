<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>离线提示</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #eef6ff, #dceeff);
      color: #0d2a43;
    }
    .box {
      width: min(560px, 92vw);
      background: #fff;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    }
    h1 { margin-top: 0; }
  </style>
</head>
<body>
  <main class="box">
    <h1>当前处于离线状态</h1>
    <p>静态界面已可访问。网络恢复后将自动刷新新闻数据。</p>
    <p><a href="./index.html">返回首页</a></p>
  </main>
</body>
</html>
